[build]
  publish = "."

# ── Basic security headers (no restrictive CSP — lets all CDN/APIs work) ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"

# ── Clean URL redirects ────────────────────────────────────────────────────
[[redirects]]
  from = "/module1"
  to   = "/module1.html"
  status = 200

